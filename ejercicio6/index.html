<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 6 - Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <div class="card-custom">

        <h1 class="titulo text-center">Biblioteca</h1>

        <div class="mb-3">
            <label>Título</label>
            <input type="text" id="titulo" class="form-control">
        </div>

        <div class="mb-3">
            <label>Autor</label>
            <input type="text" id="autor" class="form-control">
        </div>

        <div class="mb-3">
            <label>Género</label>
            <input type="text" id="genero" class="form-control">
        </div>

        <div class="mb-3">
            <label>Año de Publicación</label>
            <input type="number" id="anio" class="form-control">
        </div>

        <button class="btn btn-primary w-100" onclick="agregarLibro()">
            Agregar Libro
        </button>

        <ul id="listaLibros" class="mt-4"></ul>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
