<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Coche</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container mt-5">
        <div class="card-custom">

            <h1 class="titulo text-center">Datos del Coche</h1>

            <!-- Imagen -->
            <div class="text-center">
                <img src="https://cdn.pixabay.com/photo/2012/05/29/00/43/car-49278_1280.jpg" class="img-auto" alt="Auto">
            </div>

            <!-- Formulario -->
            <div class="mb-3">
                <label>Marca</label>
                <input type="text" id="marca" class="form-control">
            </div>

            <div class="mb-3">
                <label>Modelo</label>
                <input type="text" id="modelo" class="form-control">
            </div>

            <div class="mb-3">
                <label>Año</label>
                <input type="number" id="anio" class="form-control">
            </div>

            <div class="mb-3">
                <label>Color</label>
                <input type="text" id="color" class="form-control">
            </div>

            <div class="mb-3">
                <label>Estado</label>
                <input type="text" id="estado" class="form-control">
            </div>

            <div class="mb-3">
                <label>Precio</label>
                <input type="number" id="precio" class="form-control">
            </div>

            <button class="btn btn-primary w-100" onclick="mostrarDatos()">
                Mostrar Datos
            </button>

            <!-- Resultado -->
            <div id="resultado" class="resultado mt-4"></div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
