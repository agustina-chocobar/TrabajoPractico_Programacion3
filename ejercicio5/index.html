<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <div class="card-custom">

        <h1 class="titulo text-center">Salario del Empleado</h1>

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" id="nombre" class="form-control">
        </div>

        <div class="mb-3">
            <label>Apellido</label>
            <input type="text" id="apellido" class="form-control">
        </div>

        <div class="mb-3">
            <label>DNI</label>
            <input type="number" id="dni" class="form-control">
        </div>

        <div class="mb-3">
            <label>Dirección</label>
            <input type="text" id="direccion" class="form-control">
        </div>

        <div class="mb-3">
            <label>Horas trabajadas</label>
            <input type="number" id="horas" class="form-control">
        </div>

        <div class="mb-3">
            <label>Precio por Hora</label>
            <input type="number" id="precioHora" class="form-control">
        </div>

        <button class="btn btn-success w-100" onclick="agregarEmpleado()">
            Agregar Empleado
        </button>

        <div id="resultado" class="resultado mt-4"></div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
