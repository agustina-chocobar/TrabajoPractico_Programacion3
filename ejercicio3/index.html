<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ejercicio 3 - Producto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container mt-5">

        <div class="card-custom">

            <h1 class="titulo text-center">Datos del Producto</h1>

            <!-- Imagen -->
            <div class="text-center">
                <img src="https://cdn.pixabay.com/photo/2017/08/06/01/44/headphones-2588057_1280.jpg"
                class="img-auto"
                alt="Producto">
            </div>

            <!-- Inputs -->
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" id="nombre" class="form-control">
            </div>

            <div class="mb-3">
                <label>Precio</label>
                <input type="number" id="precio" class="form-control">
            </div>

            <div class="mb-3">
                <label>Descripción</label>
                <input type="text" id="descripcion" class="form-control">
            </div>

            <div class="mb-3">
                <label>Marca</label>
                <input type="text" id="marca" class="form-control">
            </div>

            <div class="mb-3">
                <label>Porcentaje de descuento</label>
                <input type="number" id="descuento" class="form-control">
            </div>

            <button class="btn btn-success w-100" onclick="mostrarProducto()">
                Mostrar Producto
            </button>

            <!-- Resultado -->
            <div id="resultado" class="resultado mt-4"></div>

        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
